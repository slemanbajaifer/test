<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>اختبار الحاسب والتقنية - تفاعلي</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

body {
  background: linear-gradient(135deg, #eef2f7 0%, #d9e2ec 100%);
  padding: 20px;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

.container {
  max-width: 850px;
  margin: auto;
  background: #ffffff;
  padding: 30px 25px;
  border-radius: 32px;
  box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.15);
  transition: all 0.2s ease;
}

h1 {
  text-align: center;
  margin-bottom: 20px;
  color: #1a4972;
  font-size: 1.9rem;
  letter-spacing: -0.3px;
  border-right: 5px solid #1a4972;
  padding-right: 18px;
  width: fit-content;
  margin-right: auto;
  margin-left: auto;
  background: #f0f6fe;
  padding: 12px 28px;
  border-radius: 60px;
  display: inline-block;
  width: auto;
}

.progress {
  height: 12px;
  background: #e2e8f0;
  border-radius: 40px;
  overflow: hidden;
  margin: 25px 0 18px;
  box-shadow: inset 0 1px 2px rgba(0,0,0,0.05);
}

.progress-bar {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #1a6d9c, #1e88b0);
  border-radius: 40px;
  transition: width 0.25s ease;
}

.info {
  display: flex;
  justify-content: space-between;
  margin-bottom: 20px;
  font-size: 15px;
  font-weight: 500;
  background: #f8fafc;
  padding: 10px 18px;
  border-radius: 50px;
  color: #1e4663;
  box-shadow: 0 1px 2px rgba(0,0,0,0.03);
}

.card {
  border: 1px solid #e9edf2;
  padding: 25px 22px;
  border-radius: 28px;
  background: #ffffff;
  box-shadow: 0 8px 20px rgba(0, 0, 0, 0.02);
  transition: 0.2s;
}

.question {
  font-size: 1.4rem;
  font-weight: 700;
  line-height: 1.65;
  color: #0a2f44;
  background: #f9fbfd;
  padding: 15px 18px;
  border-radius: 24px;
  margin-bottom: 12px;
}

.options {
  margin-top: 24px;
  display: grid;
  gap: 14px;
}

.option {
  padding: 14px 20px;
  border: 1px solid #e2e8f0;
  border-radius: 24px;
  background: #f9fbfe;
  cursor: pointer;
  font-size: 1rem;
  text-align: right;
  transition: all 0.2s ease;
  font-weight: 500;
  color: #1f4662;
  line-height: 1.5;
}

.option:hover {
  background: #e6f0fa;
  border-color: #9bc0da;
  transform: scale(0.99);
}

.correct {
  background: #c8f0d1 !important;
  border-color: #2b7e3a !important;
  color: #155724;
  font-weight: bold;
}

.wrong {
  background: #ffe0db !important;
  border-color: #cd5b4b !important;
  color: #a1220a;
  text-decoration: line-through;
}

.feedback {
  margin-top: 22px;
  padding: 14px 18px;
  border-radius: 24px;
  font-size: 0.95rem;
  font-weight: 500;
  line-height: 1.5;
  display: none;
  border-right: 5px solid;
}

.feedback.show {
  display: block;
}

.feedback.correct {
  background: #e1f7e8;
  color: #0a5c2e;
  border-right-color: #2e8b57;
}

.feedback.wrong {
  background: #ffe6e3;
  color: #b13e2d;
  border-right-color: #d9534f;
}

.navigation {
  margin-top: 28px;
  display: flex;
  justify-content: space-between;
  gap: 15px;
}

.btn {
  padding: 12px 28px;
  border: none;
  border-radius: 60px;
  cursor: pointer;
  background: #1e6f9f;
  color: white;
  font-size: 1rem;
  font-weight: 600;
  transition: 0.2s;
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

.btn:hover:not(:disabled) {
  background: #0f5883;
  transform: translateY(-2px);
}

.btn:disabled {
  background: #bac8d9;
  cursor: not-allowed;
  opacity: 0.7;
}

.result {
  text-align: center;
  display: none;
  background: #fefdf8;
  border-radius: 40px;
  padding: 20px;
  margin-top: 15px;
}

.result h2 {
  color: #1d5a8b;
  margin-bottom: 25px;
  font-size: 2rem;
}

.score {
  font-size: 70px;
  font-weight: 800;
  color: #1c6d9b;
  margin-bottom: 12px;
  background: #eef3fc;
  display: inline-block;
  padding: 10px 35px;
  border-radius: 100px;
}

.grade {
  font-size: 1.7rem;
  margin-bottom: 30px;
  font-weight: 500;
  color: #2c3e66;
}

.restart {
  padding: 14px 38px;
  background: #1e6f9f;
  color: white;
  border: none;
  border-radius: 60px;
  font-size: 1.1rem;
  font-weight: bold;
  cursor: pointer;
  transition: 0.2s;
}

.restart:hover {
  background: #0b5078;
  transform: scale(0.97);
}

/* ===== قسم مراجعة الأسئلة الخاطئة ===== */
.review-section {
  text-align: right;
  margin-top: 35px;
}

.review-section h3 {
  text-align: center;
  color: #a1220a;
  font-size: 1.4rem;
  margin-bottom: 20px;
  background: #ffece9;
  padding: 10px 20px;
  border-radius: 50px;
  display: inline-block;
  width: 100%;
}

.review-all-correct {
  text-align: center;
  color: #0a5c2e;
  background: #e1f7e8;
  padding: 16px 20px;
  border-radius: 24px;
  font-weight: 600;
  font-size: 1.1rem;
}

.review-item {
  border: 1px solid #f1d8d3;
  background: #fffaf8;
  border-radius: 22px;
  padding: 18px 20px;
  margin-bottom: 16px;
}

.review-q {
  font-weight: 700;
  color: #0a2f44;
  margin-bottom: 12px;
  font-size: 1.05rem;
  line-height: 1.6;
}

.review-line {
  padding: 6px 0;
  font-size: 0.95rem;
  line-height: 1.6;
}

.review-your-answer {
  color: #a1220a;
}

.review-your-answer span {
  text-decoration: line-through;
  font-weight: 600;
}

.review-correct-answer {
  color: #0a5c2e;
  font-weight: 600;
}

.review-explain {
  margin-top: 8px;
  color: #4a5a68;
  font-size: 0.9rem;
  background: #f4f8fb;
  padding: 10px 14px;
  border-radius: 16px;
}
</style>
</head>
<body>

<div class="container">

  <h1>💻 اختبار الحاسب والتقنية</h1>

  <div class="progress">
    <div class="progress-bar" id="progressBar"></div>
  </div>

  <div class="info">
    <span id="counter">السؤال 1 من 60</span>
    <span id="scoreLive">⭐ الدرجة: 0</span>
  </div>

  <div id="quizBox" class="card">
    <div id="question" class="question"></div>
    <div id="options" class="options"></div>
    <div id="feedback" class="feedback"></div>
  </div>

  <div class="navigation">
    <button class="btn" id="prevBtn">◀ السابق</button>
    <button class="btn" id="nextBtn">التالي ▶</button>
  </div>

  <div class="result" id="resultBox">
    <h2>📊 النتيجة النهائية</h2>
    <div class="score" id="finalScore"></div>
    <div class="grade" id="grade"></div>
    <button class="restart" id="restartBtn">🔄 إعادة الاختبار</button>

    <div class="review-section" id="reviewSection"></div>
  </div>

</div>

<script>
// ======================== قائمة الأسئلة ========================

const questions = [
  { type: "mcq", q: "ما تعريف ROM؟", options: [

  { type: "mcq", q: "ما تعريف RAM؟", options: [

  { type: "mcq", q: "ما تعريف المعالج (CPU)؟", options: [
      "الوحدة المسؤولة عن معالجة الأوامر وتنفيذ العمليات داخل الحاسب",

  { type: "mcq", q: "ما تعريف وحدة الحساب والمنطق (ALU)؟", options: [

      "الوحدة التي تخزن البيانات بشكل دائم"
    ], correct: "الوحدة التي تقوم بالعمليات الحسابية والمنطقية",
    explanation: "ALU مسؤولة عن الجمع والطرح والمقارنات المنطقية." },

  { type: "mcq", q: "ما تعريف وحدة التحكم والسيطرة (Control Unit)؟", options: [
      "الوحدة التي تنسق وتوجه عمليات باقي مكونات الحاسب",

  { type: "mcq", q: "ما تعريف البت (Bit)؟", options: [

  { type: "mcq", q: "ما تعريف البايت (Byte)؟", options: [

  { type: "mcq", q: "ما تعريف الكيلوبايت (KB)؟", options: [

  { type: "mcq", q: "ما تعريف الجيجابايت (GB)؟", options: [

  { type: "mcq", q: "ما تعريف العتاد (Hardware)؟", options: [

  { type: "mcq", q: "ما تعريف البرمجيات (Software)؟", options: [
      "مجموعة من البرامج والتعليمات التي تشغل الحاسب وتؤدي مهامه",
      "المكونات المادية الملموسة للحاسب",
      "جهاز يُستخدم لإدخال البيانات",

  { type: "mcq", q: "ما تعريف نظام التشغيل (Operating System)؟", options: [

      "جهاز يعرض نتائج الحاسب للمستخدم",

  { type: "mcq", q: "ما تعريف مضاد الفيروسات (Antivirus)؟", options: [

    [result[i], result[j]] = [result[j], result[i]];
  }
  return result;
}

// عناصر DOM
const questionEl = document.getElementById("question");
const optionsContainer = document.getElementById("options");
const feedbackDiv = document.getElementById("feedback");
const counterSpan = document.getElementById("counter");
const scoreSpan = document.getElementById("scoreLive");
const progressBar = document.getElementById("progressBar");
const prevBtn = document.getElementById("prevBtn");
const nextBtn = document.getElementById("nextBtn");
const quizBox = document.getElementById("quizBox");
const resultBox = document.getElementById("resultBox");
const finalScoreSpan = document.getElementById("finalScore");
const gradeSpan = document.getElementById("grade");
const restartBtn = document.getElementById("restartBtn");
const reviewSection = document.getElementById("reviewSection");

// ========== وظيفة حساب الدرجة بناءً على userAnswers ==========
function computeScore() {
  let totalScore = 0;
  for (let i = 0; i < questions.length; i++) {
    if (userAnswers[i] !== null && userAnswers[i] === questions[i].correct) {
      totalScore++;
    }
  }
  return totalScore;
}

// تحديث عرض الدرجة + شريط التقدم + عداد السؤال
function updateStatsAndProgress() {
  const currentScore = computeScore();
  scoreSpan.textContent = `⭐ الدرجة: ${currentScore}`;
  counterSpan.textContent = `السؤال ${currentIndex + 1} من ${questions.length}`;
  const percent = ((currentIndex + 1) / questions.length) * 100;
  progressBar.style.width = `${percent}%`;
}

// إعادة تحميل السؤال الحالي مع عرض الإجابة السابقة إن وجدت
function renderCurrentQuestion() {
  const qData = questions[currentIndex];
  if (!qData) return;

  // عرض نص السؤال
  questionEl.textContent = qData.q;

  // إعادة بناء خيارات الإجابة
  optionsContainer.innerHTML = "";
  feedbackDiv.className = "feedback";
  feedbackDiv.style.display = "none";

  // تحديد الخيارات حسب نوع السؤال
  let opts;
  if (qData.type === "tf") {
    opts = ["صح", "خطأ"];
  } else {
    // نخلط ترتيب الخيارات مرة واحدة فقط لكل سؤال، ونحتفظ بنفس الترتيب عند الرجوع للسؤال
    if (!shuffledOptionsCache[currentIndex]) {
      shuffledOptionsCache[currentIndex] = shuffleArray(qData.options);
    }
    opts = shuffledOptionsCache[currentIndex];
  }

  opts.forEach(opt => {
    const btn = document.createElement("button");
    btn.className = "option";
    btn.textContent = opt;
    btn.setAttribute("data-value", opt);

    // إذا كان السؤال قد تمت الإجابة عليه مسبقاً نعطيه الحالة المناسبة ونعطله
    const savedAnswer = userAnswers[currentIndex];
    if (savedAnswer !== null) {
      btn.disabled = true;
      if (opt === qData.correct) {
        btn.classList.add("correct");
      }
      if (opt === savedAnswer && savedAnswer !== qData.correct) {
        btn.classList.add("wrong");
      }
      if (opt === savedAnswer && savedAnswer === qData.correct) {
        btn.classList.add("correct");
      }
    } else {
      btn.disabled = false;
      btn.onclick = (e) => handleAnswer(opt, btn);
    }

    optionsContainer.appendChild(btn);
  });

  // إظهار التغذية الراجعة إذا كان السؤال قد تمت الإجابة عليه مسبقاً
  if (userAnswers[currentIndex] !== null) {
    const chosen = userAnswers[currentIndex];
    const isCorrect = (chosen === qData.correct);
    if (isCorrect) {
      feedbackDiv.textContent = `✔ إجابة صحيحة. ${qData.explanation ? qData.explanation : ""}`;
      feedbackDiv.className = "feedback correct show";
    } else {
      feedbackDiv.textContent = `✖ خطأ. الإجابة الصحيحة: ${qData.correct}. ${qData.explanation ? qData.explanation : ""}`;
      feedbackDiv.className = "feedback wrong show";
    }
    feedbackDiv.style.display = "block";
  } else {
    feedbackDiv.style.display = "none";
    feedbackDiv.className = "feedback";
  }

  // تحديث أزرار التنقل
  prevBtn.disabled = (currentIndex === 0);
  const isCurrentAnswered = (userAnswers[currentIndex] !== null);
  nextBtn.disabled = !isCurrentAnswered;

  // تحديث الإحصائيات
  updateStatsAndProgress();
}

// معالج اختيار الإجابة
function handleAnswer(selectedValue, buttonElement) {
  // منع التحديد المزدوج
  if (userAnswers[currentIndex] !== null) return;

  const currentQ = questions[currentIndex];
  const isAnswerCorrect = (selectedValue === currentQ.correct);

  // حفظ الإجابة
  userAnswers[currentIndex] = selectedValue;

  // تعطيل جميع الأزرار وتلوينها
  const allBtns = document.querySelectorAll(".option");
  allBtns.forEach(btn => {
    btn.disabled = true;
    const val = btn.getAttribute("data-value");
    if (val === currentQ.correct) {
      btn.classList.add("correct");
    } else if (val === selectedValue && !isAnswerCorrect) {
      btn.classList.add("wrong");
    } else if (val === selectedValue && isAnswerCorrect) {
      btn.classList.add("correct");
    }
  });

  // عرض التغذية الراجعة
  if (isAnswerCorrect) {
    feedbackDiv.textContent = `✔ إجابة صحيحة! ${currentQ.explanation || ""}`;
    feedbackDiv.className = "feedback correct show";
  } else {
    feedbackDiv.textContent = `✖ إجابة خاطئة. الإجابة الصحيحة: ${currentQ.correct}. ${currentQ.explanation || ""}`;
    feedbackDiv.className = "feedback wrong show";
  }
  feedbackDiv.style.display = "block";

  // تحديث الدرجة وشريط التقدم
  updateStatsAndProgress();

  // تمكين زر التالي لأنه تمت الإجابة
  nextBtn.disabled = false;
}

// الانتقال للسؤال التالي
function goToNext() {
  if (currentIndex < questions.length - 1) {
    currentIndex++;
    renderCurrentQuestion();
  } else {
    // اكتمل الاختبار
    showFinalResult();
  }
}

// الانتقال للسؤال السابق
function goToPrev() {
  if (currentIndex > 0) {
    currentIndex--;
    renderCurrentQuestion();
  }
}

// بناء قسم مراجعة الأسئلة الخاطئة
function renderWrongAnswersReview() {
  reviewSection.innerHTML = "";

  // جمع الأسئلة التي أُجيب عليها بشكل خاطئ (أو لم تُجب)
  const wrongList = [];
  for (let i = 0; i < questions.length; i++) {
    const q = questions[i];
    const given = userAnswers[i];
    if (given === null || given !== q.correct) {
      wrongList.push({ index: i, question: q, given: given });
    }
  }

  if (wrongList.length === 0) {
    const allCorrectDiv = document.createElement("div");
    allCorrectDiv.className = "review-all-correct";
    allCorrectDiv.textContent = "🎉 ما شاء الله! أجبت على جميع الأسئلة بشكل صحيح، لا توجد أخطاء لمراجعتها.";
    reviewSection.appendChild(allCorrectDiv);
    return;
  }

  const heading = document.createElement("h3");
  heading.textContent = `📝 مراجعة الأسئلة الخاطئة (${wrongList.length})`;
  reviewSection.appendChild(heading);

  wrongList.forEach(item => {
    const box = document.createElement("div");
    box.className = "review-item";

    const qLine = document.createElement("div");
    qLine.className = "review-q";
    qLine.textContent = `${item.index + 1}. ${item.question.q}`;
    box.appendChild(qLine);

    const yourLine = document.createElement("div");
    yourLine.className = "review-line review-your-answer";
    if (item.given === null) {
      yourLine.innerHTML = `إجابتك: <span>لم تتم الإجابة</span>`;
    } else {
      yourLine.innerHTML = `إجابتك: <span>${item.given}</span>`;
    }
    box.appendChild(yourLine);

    const correctLine = document.createElement("div");
    correctLine.className = "review-line review-correct-answer";
    correctLine.textContent = `الإجابة الصحيحة: ${item.question.correct}`;
    box.appendChild(correctLine);

    if (item.question.explanation) {
      const explainLine = document.createElement("div");
      explainLine.className = "review-explain";
      explainLine.textContent = item.question.explanation;
      box.appendChild(explainLine);
    }

    reviewSection.appendChild(box);
  });
}

// عرض نتيجة الاختبار النهائية
function showFinalResult() {
  // إخفاء واجهة الأسئلة وإظهار النتيجة
  quizBox.style.display = "none";
  document.querySelector(".navigation").style.display = "none";

  const totalScoreFinal = computeScore();
  const percentTotal = Math.round((totalScoreFinal / questions.length) * 100);

  finalScoreSpan.textContent = `${totalScoreFinal} / ${questions.length}`;

  let gradeMessage = "";
  if (percentTotal >= 90) gradeMessage = "ممتاز 🏆";
  else if (percentTotal >= 75) gradeMessage = "جيد جداً ⭐";
  else if (percentTotal >= 60) gradeMessage = "جيد 👍";
  else gradeMessage = "يحتاج مراجعة 📚";

  gradeSpan.textContent = `${gradeMessage} - ${percentTotal}%`;

  // عرض مراجعة الأسئلة الخاطئة
  renderWrongAnswersReview();

  resultBox.style.display = "block";
}

// إعادة ضبط الاختبار بالكامل
function resetQuiz() {
  // إعادة تعيين البيانات
  userAnswers = new Array(questions.length).fill(null);
  shuffledOptionsCache = new Array(questions.length).fill(null);
  currentIndex = 0;

  // إظهار صندوق الأسئلة وإخفاء النتيجة
  quizBox.style.display = "block";
  document.querySelector(".navigation").style.display = "flex";
  resultBox.style.display = "none";
  reviewSection.innerHTML = "";

  // إعادة تعيين الشريط والعدادات
  updateStatsAndProgress();
  renderCurrentQuestion();
}

// ربط الأحداث
prevBtn.onclick = goToPrev;
nextBtn.onclick = goToNext;
restartBtn.onclick = () => resetQuiz();

// بدء الاختبار لأول مرة
renderCurrentQuestion();

// إضافة تحسين: في حال عدم ظهور أي سؤال لأي سبب نتأكد من ظهوره
window.addEventListener("load", () => {
  if (questions.length > 0 && questionEl.innerText.trim() === "") {
    renderCurrentQuestion();
  }
});
</script>
