<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Tahoma,sans-serif;
}

body{
background:#f4f7fb;
padding:20px;
}

.container{
max-width:800px;
margin:auto;
background:#fff;
padding:25px;
border-radius:12px;
box-shadow:0 2px 12px rgba(0,0,0,.08);
}

h1{
text-align:center;
margin-bottom:20px;
color:#185FA5;
}

.progress{
height:10px;
background:#ddd;
border-radius:20px;
overflow:hidden;
margin-bottom:20px;
}

.progress-bar{
height:100%;
width:0%;
background:#185FA5;
transition:.3s;
}

.info{
display:flex;
justify-content:space-between;
margin-bottom:20px;
font-size:14px;
color:#666;
}

.card{
border:1px solid #ddd;
padding:20px;
border-radius:10px;
}

.question{
font-size:20px;
font-weight:bold;
line-height:1.8;
}

.options{
margin-top:20px;
display:grid;
gap:10px;
}

.option{
padding:12px;
border:none;
border-radius:8px;
background:#f1f4f8;
cursor:pointer;
font-size:16px;
text-align:right;
transition:.2s;
}

.option:hover{
background:#e3edf8;
}

.correct{
background:#dff4d8 !important;
}

.wrong{
background:#ffd9d9 !important;
}

.feedback{
margin-top:15px;
padding:10px;
border-radius:8px;
display:none;
}

.feedback.show{
display:block;
}

.feedback.correct{
background:#dff4d8;
color:#1c6e00;
}

.feedback.wrong{
background:#ffd9d9;
color:#8a0000;
}

.navigation{
margin-top:20px;
display:flex;
justify-content:space-between;
}

.btn{
padding:10px 20px;
border:none;
border-radius:8px;
cursor:pointer;
background:#185FA5;
color:white;
font-size:15px;
}

.btn:disabled{
background:#ccc;
cursor:not-allowed;
}

.result{
text-align:center;
display:none;
}

.result h2{
margin-bottom:20px;
}

.score{
font-size:60px;
color:#185FA5;
margin-bottom:15px;
}

.grade{
font-size:22px;
margin-bottom:20px;
}

.restart{
padding:12px 25px;
background:#185FA5;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}
</style>
</head>

<div class="container">

let current = 0;
let score = 0;
let answers = new Array(questions.length).fill(null);

const questionEl = document.getElementById("question");
const optionsEl = document.getElementById("options");
const feedbackEl = document.getElementById("feedback");
const counterEl = document.getElementById("counter");
const scoreEl = document.getElementById("scoreLive");
const progressBar = document.getElementById("progressBar");

const prevBtn = document.getElementById("prevBtn");
const nextBtn = document.getElementById("nextBtn");

function loadQuestion() {
  const q = questions[current];

  counterEl.textContent = `السؤال ${current + 1} من ${questions.length}`;
  scoreEl.textContent = `الدرجة: ${score}`;

  progressBar.style.width = ((current + 1) / questions.length) * 100 + "%";

  questionEl.textContent = q.q;
  optionsEl.innerHTML = "";
  feedbackEl.className = "feedback";
  feedbackEl.style.display = "none";

  let opts = [];

  if (q.type === "tf") {
    opts = ["صح", "خطأ"];
  } else {
    opts = q.options;
  }

  opts.forEach(opt => {
    const btn = document.createElement("button");
    btn.className = "option";
    btn.textContent = opt;

    btn.onclick = () => selectAnswer(opt, btn);

    optionsEl.appendChild(btn);
  });

  prevBtn.disabled = current === 0;
  nextBtn.disabled = answers[current] === null;
}

function selectAnswer(answer, btn) {
  if (answers[current] !== null) return;

  const q = questions[current];
  answers[current] = answer;

  const buttons = document.querySelectorAll(".option");

  buttons.forEach(b => {
    b.disabled = true;
    if (b.textContent === q.correct) {
      b.classList.add("correct");
    } else if (b.textContent === answer) {
      b.classList.add("wrong");
    }
  });

  if (answer === q.correct) {
    score++;
    feedbackEl.textContent = "✔ إجابة صحيحة";
    feedbackEl.className = "feedback correct show";
  } else {
    feedbackEl.textContent = `✖ خطأ. الإجابة الصحيحة: ${q.correct}\n${q.explanation}`;
    feedbackEl.className = "feedback wrong show";
  }

  feedbackEl.style.display = "block";
  scoreEl.textContent = `الدرجة: ${score}`;

  nextBtn.disabled = false;
}

nextBtn.onclick = () => {
  if (current < questions.length - 1) {
    current++;
    loadQuestion();
  } else {
    showResult();
  }
};

prevBtn.onclick = () => {
  if (current > 0) {
    current--;
    loadQuestion();
  }
};

function showResult() {
  document.getElementById("quizBox").style.display = "none";
  document.querySelector(".navigation").style.display = "none";

  const resultBox = document.getElementById("resultBox");
  resultBox.style.display = "block";

  const percent = Math.round((score / questions.length) * 100);

  document.getElementById("finalScore").textContent =
    `${score} / ${questions.length}`;

  let grade = "";

  if (percent >= 90) grade = "ممتاز 🏆";
  else if (percent >= 75) grade = "جيد جداً ⭐";
  else if (percent >= 60) grade = "جيد 👍";
  else grade = "يحتاج مراجعة 📚";

  document.getElementById("grade").textContent =
    `${grade} - ${percent}%`;
}

loadQuestion();
